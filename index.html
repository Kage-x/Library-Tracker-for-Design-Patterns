<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> Library Tracker</title>
    <link rel="stylesheet" href="Frontend/styles.css">
    <script type="module" src="dist/app.js"></script>
</head>
<body>

    <div id="stats-container"></div>
    <div id="form-container">
        <h1 id="form-heading"><span aria-hidden="true">📖</span> Add Book</h1>
        <form id="bookForm">
            <div class="field">
                <label for="titleInput">Title</label>
                <input id="titleInput" type="text" />
            </div>

            <div class="field">
                <label for="authorInput">Author</label>
                <input id="authorInput" type="text" />
            </div>

            <div class="field">
                <label for="genreInput">Genre</label>
                <input id="genreInput" type="text" />
            </div>

            <div class="field">
                <label for="yearInput">Year</label>
                <input id="yearInput" type="number" />
            </div>

            <button id="bookButton" type="submit">Add Book</button>
        </form>
    </div>
    <div id="errorMessage"></div>
    <div id="bookList"> </div>

</body>
</html>
